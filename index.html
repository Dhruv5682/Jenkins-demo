<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Simple Web Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
            background-color: #f4f4f9;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            display: inline-block;
        }
        h1 {
            color: #0078D4; /* Azure Blue */
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hello from Azure!</h1>
        <p>This simple web page was deployed successfully using a <b>Jenkins</b> CI/CD Pipeline.</p>
    </div>
</body>
</html>
